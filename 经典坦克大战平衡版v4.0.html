    ctx.strokeStyle = "#fff";
    ctx.strokeRect(140, 120, 560, 110);

    ctx.fillStyle = "#f87171";
    ctx.font = "24px Arial";
    ctx.fillText(t("boss.intro"), 345, 160);

    ctx.fillStyle = "#fff";
    ctx.font = "30px Arial";
    ctx.fillText(state.bossIntroText, 190, 202);
  }

  function drawStageIntro() {
    if (state.stageIntroTimer <= 0 || state.screen !== "playing") return;

    const fade = clamp(state.stageIntroTimer / 30, 0, 1);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.fillStyle = "rgba(15,23,42,0.82)";
    ctx.fillRect(166, 34, 500, 76);
    ctx.strokeStyle = "#facc15";
    ctx.lineWidth = 2;
    ctx.strokeRect(166, 34, 500, 76);
    ctx.fillStyle = "#facc15";
    ctx.font = "26px Arial";
    ctx.fillText(state.stageIntroTitle, 190, 66);
    ctx.fillStyle = "#e5e7eb";
    ctx.font = "18px Arial";
    ctx.fillText(state.stageIntroText, 190, 95);
    ctx.restore();
  }

  function drawWorld() {
    const sx = state.shake ? rand(-state.shake, state.shake) : 0;
    const sy = state.shake ? rand(-state.shake, state.shake) : 0;

    ctx.save();
    ctx.translate(sx, sy);
    drawMap();
    drawEagle();

    for (const sp of spawnEffects) sp.draw();
    for (const pw of powerups) pw.draw();
    for (const p of players) p.draw();
    for (const e of enemies) e.draw();
    for (const b of bullets) b.draw();
    for (const hf of hitEffects) hf.draw();
    for (const ex of explosions) ex.draw();
    for (const ft of floatTexts) ft.draw();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, BASE_W, BASE_H);
    drawWorld();
    drawBossPanel();
    drawHUD();

    if (state.screen === "menu") drawMenu();
    if (state.screen === "rules") drawRulesScreen();
    if (state.screen === "settings") drawSettingsScreen();
    if (state.screen === "leaderboard") drawLeaderboardScreen();
    if (state.screen === "stageclear") drawStageClear();
    if (state.screen === "reward") drawReward();
    if (state.screen === "gameover") drawGameOver();

    drawStageIntro();
    drawBossIntro();
    drawPauseMenu();
  }

  function handlePauseAction() {
    if (state.pausedSelection === 0) {
      paused = false;
      clearInputState();
    } else if (state.pausedSelection === 1) {
      buildStage();
    } else if (state.pausedSelection === 2) {
      state.screen = "menu";
      paused = false;
      clearInputState();
    }
  }

  document.addEventListener("keydown", (e) => {
    if (!applyDirectionalKeydown(e)) {
      keys[e.key] = true;
      keys[e.code] = true;
    }

    if (state.screen === "menu") {
      const menuItemCount = 8;

      if (e.key === "1" || e.code === "Digit1" || e.code === "Numpad1") {
        state.menuMode = 1;
        startGame();
        return;
      }
      if (e.key === "2" || e.code === "Digit2" || e.code === "Numpad2") {
        state.menuMode = 2;
        startGame();
        return;
      }
      if (e.key === "h" || e.key === "H" || e.code === "KeyH") {
        state.screen = "rules";
        clearInputState();
        return;
      }
      if (e.key === "k" || e.key === "K" || e.code === "KeyK") {
        state.screen = "settings";
        state.settingsSelection = 0;
        state.rebindingAction = null;
        clearInputState();
        return;
      }
      if (e.key === "l" || e.key === "L" || e.code === "KeyL") {
        state.screen = "leaderboard";
        clearInputState();
        return;
      }

      if (e.key === "ArrowUp") state.menuSelection = (state.menuSelection + menuItemCount - 1) % menuItemCount;
      else if (e.key === "ArrowDown") state.menuSelection = (state.menuSelection + 1) % menuItemCount;
      else if (e.key === "ArrowLeft") {
        if (state.menuSelection === 0) state.menuMode = state.menuMode === 1 ? 2 : 1;
        if (state.menuSelection === 1) state.menuDifficulty = (state.menuDifficulty + 2) % 3;
        if (state.menuSelection === 2) state.menuStage = Math.max(1, state.menuStage - 1);
        if (state.menuSelection === 3) cycleLanguage(-1);
      } else if (e.key === "ArrowRight") {
        if (state.menuSelection === 0) state.menuMode = state.menuMode === 1 ? 2 : 1;
        if (state.menuSelection === 1) state.menuDifficulty = (state.menuDifficulty + 1) % 3;
        if (state.menuSelection === 2) state.menuStage = Math.min(state.unlockedStage, state.menuStage + 1);
        if (state.menuSelection === 3) cycleLanguage(1);
      } else if (e.key === "Enter") {
        if (state.menuSelection === 3) {
          cycleLanguage(1);
        }
        else if (state.menuSelection === 4) {
          state.screen = "rules";
          clearInputState();
        }
        else if (state.menuSelection === 5) {
          state.screen = "settings";
          state.settingsSelection = 0;
          state.rebindingAction = null;
          clearInputState();
        }
        else if (state.menuSelection === 6) {
          state.screen = "leaderboard";
          clearInputState();
        }
        else if (state.menuSelection === 7) startGame();
      }

      state.menuStage = clamp(state.menuStage, 1, Math.max(1, state.unlockedStage));
      return;
    }

    if (state.screen === "leaderboard") {
      if (e.key === "ArrowLeft") {
        state.leaderboardModeFilter = (state.leaderboardModeFilter + 2) % 3;
        return;
      }
      if (e.key === "ArrowRight") {
        state.leaderboardModeFilter = (state.leaderboardModeFilter + 1) % 3;
        return;
      }
      if (e.key === "ArrowUp") {
        state.leaderboardDifficultyFilter = (state.leaderboardDifficultyFilter + 3) % 4;
        return;
      }
      if (e.key === "ArrowDown") {
        state.leaderboardDifficultyFilter = (state.leaderboardDifficultyFilter + 1) % 4;
        return;
      }
      if (
        e.key === "Escape" ||
        e.key === "Backspace" ||
        e.key === "Enter" ||
        e.key === "l" ||
        e.key === "L" ||
        e.code === "KeyL"
      ) {
        state.screen = "menu";
        clearInputState();
      }
      return;
    }

    if (state.screen === "rules") {
      if (
        e.key === "Escape" ||
        e.key === "Backspace" ||
        e.key === "Enter" ||
        e.key === "h" ||
        e.key === "H" ||
        e.code === "KeyH"
      ) {
        state.screen = "menu";
        clearInputState();
      }
      return;
    }

    if (state.screen === "settings") {
      const entries = getSettingsEntries();
      if (state.rebindingAction) {
        if (e.key === "Escape") {
          state.rebindingAction = null;
          clearInputState();
          return;
        }
        applyBindingChange(state.rebindingAction.controlType, state.rebindingAction.action, e);
        state.rebindingAction = null;
        return;
      }
      if (e.key === "ArrowUp") {
        state.settingsSelection = (state.settingsSelection + entries.length - 1) % entries.length;
        return;
      }
      if (e.key === "ArrowDown") {
        state.settingsSelection = (state.settingsSelection + 1) % entries.length;
        return;
      }
      if (e.key === "r" || e.key === "R" || e.code === "KeyR") {
        resetKeyBindingsToDefault();
        return;
      }
      if (e.key === "Enter") {
        const entry = entries[state.settingsSelection];
        if (entry.type === "command") {
          resetKeyBindingsToDefault();
        } else {
          state.rebindingAction = { controlType: entry.controlType, action: entry.action };
          clearInputState();
        }
        return;
      }
      if (
        e.key === "Escape" ||
        e.key === "Backspace" ||
        e.key === "k" ||
        e.key === "K" ||
        e.code === "KeyK"
      ) {
        state.screen = "menu";
        clearInputState();
      }
      return;
    }

    if ((e.key === "p" || e.key === "P" || e.code === "KeyP") && state.screen === "playing") {
      paused = !paused;
      clearInputState();
      return;
    }

    if (paused && state.screen === "playing") {
      if (e.key === "ArrowUp") state.pausedSelection = (state.pausedSelection + 2) % 3;
      else if (e.key === "ArrowDown") state.pausedSelection = (state.pausedSelection + 1) % 3;
      else if (e.key === "Enter") handlePauseAction();
      return;
    }

    if ((e.key === "r" || e.key === "R" || e.code === "KeyR") && state.screen === "playing") {
      buildStage();
      return;
    }

    if (state.screen === "playing") {
      const p1 = players.find(p => p.controlType === 1 && p.alive);
      const p2 = players.find(p => p.controlType === 2 && p.alive);

      if (matchesAction(1, "shoot", e) && p1) {
        e.preventDefault();
        p1.shoot();
      }
      if (matchesAction(2, "shoot", e) && p2) {
        p2.shoot();
      }
      if (matchesAction(1, "dash", e) && p1) {
        e.preventDefault();
        p1.startPlayerDash();
      }
      if (matchesAction(2, "dash", e) && p2) {
        p2.startPlayerDash();
      }
      return;
    }

    if (state.screen === "reward") {
      if (e.key === "1" || e.code === "Digit1" || e.code === "Numpad1") applyRewardChoice(0);
      if (e.key === "2" || e.code === "Digit2" || e.code === "Numpad2") applyRewardChoice(1);
      if (e.key === "3" || e.code === "Digit3" || e.code === "Numpad3") applyRewardChoice(2);
      if (e.key === "4" || e.code === "Digit4" || e.code === "Numpad4") applyRewardChoice(3);
      return;
    }

    if (state.screen === "gameover") {
      if (e.key === "Enter") {
        state.screen = "menu";
        clearInputState();
      } else if (e.key === "r" || e.key === "R" || e.code === "KeyR") {
        state.runRecorded = false;
        buildStage();
      }
    }
  });

  document.addEventListener("keyup", (e) => {
    if (!applyDirectionalKeyup(e)) {
      delete keys[e.key];
      delete keys[e.code];
    }
  });
  window.addEventListener("blur", clearInputState);
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) clearInputState();
  });

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  buildMap();
  loop();
})();
</script>
</body>
</html>
