<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>历史版本 · 经典坦克大战平衡版</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0b0d;
    --panel: rgba(20, 23, 29, 0.94);
    --line: rgba(255,255,255,0.12);
    --text: #f2f4f8;
    --muted: #acb5c5;
    --gold: #f0c24d;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, "Microsoft YaHei", sans-serif;
  }

  body {
    padding: 28px 16px 48px;
  }

  .page {
    width: min(960px, 100%);
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .topbar a {
    color: var(--muted);
    text-decoration: none;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 34px;
  }

  .intro {
    margin: 0 0 22px;
    color: var(--muted);
    line-height: 1.7;
  }

  .entry {
    margin-bottom: 14px;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel);
  }

  .entry header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .entry h2 {
    margin: 0;
    font-size: 22px;
  }

  .entry span,
  .entry p {
    color: #d7ddea;
    line-height: 1.8;
  }

  .entry .meta {
    color: var(--muted);
    font-size: 14px;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .button {
    display: inline-block;
    padding: 12px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
  }

  .button.primary {
    background: var(--gold);
    color: #1d1503;
  }

  .button.secondary {
    border: 1px solid var(--line);
    color: var(--text);
  }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="../">返回首页</a>
      <a href="../updates/">查看更新</a>
    </div>

    <h1>历史版本</h1>
    <p class="intro">
      这里保留正式发布入口以外仍可访问的历史版本。默认推荐游玩最新版，历史版本主要用于回看、对比和备份。
    </p>

    <article class="entry">
      <header>
        <h2>v3.8</h2>
        <span class="meta">当前正式版本</span>
      </header>
      <p>当前默认游玩入口，包含道具停留时间延长与 `shield` 地图道具强化等最新调整。</p>
      <div class="actions">
        <a class="button primary" href="../经典坦克大战平衡版v3.8.html">打开 v3.8</a>
      </div>
    </article>

    <article class="entry">
      <header>
        <h2>v3.7</h2>
        <span class="meta">历史版本</span>
      </header>
      <p>保留为可查找历史版本，适合回看护盾图标液位式显示、玩家尺寸 24 以及当时的战斗手感。</p>
      <div class="actions">
        <a class="button secondary" href="../经典坦克大战平衡版v3.7.html">打开 v3.7</a>
      </div>
    </article>
  </div>
</body>
</html>
